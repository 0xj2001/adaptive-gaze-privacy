# Test configuration for synthetic data (fast training)
project:
  name: "eye_tracking_privacy_test"
  seed: 42

data:
  dataset: "gazebase"
  data_dir: "./data/synthetic_gazebase"  # 使用仿真数据
  split_strategy: "recording"
  use_cache: false
  sampling_rate: 1000
  window_size: 1000
  window_stride: 500
  features: ["x", "y", "pupil", "velocity_x", "velocity_y"]
  tasks: ["FXS", "HSS", "RAN", "TEX"]
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  min_sessions_per_subject: 2
  num_workers: 0
  val_num_workers: 0

model:
  encoder:
    input_dim: 5
    hidden_dims: [64, 32, 16]  # 减小网络（快速测试）
    latent_dim: 8              # 减小潜空间维度
    activation: "relu"
    dropout: 0.1

  decoder:
    hidden_dims: [16, 32, 64]
    output_dim: 5
    activation: "relu"

  noise:
    mode: "adaptive"
    fixed_sigma: 0.1
    sigma_min: 0.01
    sigma_max: 1.0
    sensitivity_hidden: [8, 8]

  attacker:
    hidden_dims: [32, 64, 32]  # 减小网络
    dropout: 0.2

  utility:
    hidden_dims: [32, 16]
    dropout: 0.1

training:
  epochs: 20                    # 减少epoch（快速测试）
  batch_size: 64                # 减小batch size
  lr_autoencoder: 1e-3
  lr_attacker: 1e-3
  lr_utility: 1e-3
  weight_decay: 1e-5
  scheduler: "cosine"

  # Loss weights
  lambda_reconstruction: 1.0
  lambda_privacy: 0.5
  lambda_utility: 0.3

  # Adversarial training schedule
  attacker_pretrain_epochs: 3   # 减少预训练
  attacker_steps_per_ae_step: 3

  # Early stopping
  patience: 10
  monitor: "val_privacy_utility_score"

evaluation:
  privacy:
    - "identification_accuracy"
    - "equal_error_rate"
    - "reidentification_rate"
  utility:
    - "reconstruction_mse"
    - "fixation_detection_f1"
    - "saccade_correlation"
    - "dtw_distance"

logging:
  use_wandb: false
  log_interval: 5
  save_interval: 10
  output_dir: "./experiments_test"
