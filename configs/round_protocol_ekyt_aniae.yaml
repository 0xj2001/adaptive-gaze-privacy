# Round-protocol ANIAE experiment with EKYT-style biometric evaluation.
project:
  name: "eye_tracking_privacy_round_protocol_ekyt_aniae"
  seed: 42

data:
  dataset: "gazebase"
  data_dir: "./data/gazebase"
  split_strategy: "round_protocol"
  identity_field: "person_id"
  use_cache: true
  cache_dir: "./data/cache_round_protocol_1248"
  cache_lru_size: 64
  preprocess_mode: "ak250_sin_xy"
  sampling_rate: 250
  sampling_rate_in: 1000
  sampling_rate_out: 250
  window_size: 1248
  window_stride: 1248
  subwindow_size: 16
  features: ["x", "y"]
  tasks: ["FXS", "HSS", "RAN", "TEX"]
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  num_workers: 8
  val_num_workers: 4
  pin_memory: true
  round_protocol:
    expected_subjects:
      train: 186
      val: 31
      test: 105
    enrollment_task: "RAN"
    enrollment_session: 1
    probe_session: 2

biometric_model:
  embedding_dim: 128
  base_channels: 64
  growth_rate: 16
  block_layers: [4, 4, 4]
  dropout: 0.2

task_model:
  hidden_dim: 128
  dropout: 0.2

biometric_training:
  epochs: 50
  lr: 1e-3
  weight_decay: 1e-4
  patience: 8
  pk_p: 32
  pk_k: 4
  steps_per_epoch: 300
  ms_alpha: 2.0
  ms_beta: 50.0
  ms_base: 0.5
  ce_weight: 0.2
  eval_batch_size: 128
  monitor: "val_rank1_ir"

task_training:
  epochs: 30
  batch_size: 256
  lr: 1e-3
  weight_decay: 1e-4
  patience: 6
  monitor: "val_accuracy"

model:
  encoder:
    input_dim: 2
    hidden_dims: [64, 64]
    latent_dim: 16
    dropout: 0.1

  decoder:
    hidden_dims: [32, 64]
    output_dim: 2

  noise:
    mode: "adaptive"
    fixed_sigma: 0.1
    sigma_min: 0.01
    sigma_max: 1.0
    sensitivity_hidden: [16, 16]

  attacker:
    hidden_dims: [256, 128]
    dropout: 0.3

  utility:
    hidden_dims: [64, 32]
    dropout: 0.1

aniae_training:
  epochs: 60
  batch_size: 128
  lr_autoencoder: 3e-4
  weight_decay: 1e-5
  patience: 10
  lambda_reconstruction: 1.0
  lambda_privacy: 0.2
  lambda_utility: 0.3
  lambda_noise: 0.01
  target_sigma: 0.3
  privacy_temperature: 0.1
  monitor: "val_score"

baselines:
  gaussian_sigmas: [0.05, 0.1, 0.2, 0.5, 1.0]
  dp_epsilons: [1, 5, 10, 20]
  dp_sensitivity: 2.0
  fixed_ae_sigmas: [0.05, 0.1, 0.5, 1.0]
  excluded_fixed_ae_sigmas: [0.2]

paths:
  biometric_evaluator: "./experiments/biometric_tune_a/checkpoint_best.pt"
  task_evaluator: "./experiments/task_evaluator_round_protocol/checkpoint_best.pt"
  results_dir: "./experiments/round_protocol_results"

logging:
  output_dir: "./experiments"
  save_interval: 5
