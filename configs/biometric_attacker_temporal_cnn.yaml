# Independent Temporal-CNN biometric evaluator for post-hoc attacker robustness checks.
project:
  name: "eye_tracking_privacy_round_protocol_temporal_cnn_attacker"
  seed: 42

data:
  dataset: "gazebase"
  data_dir: "./data/gazebase"
  split_strategy: "round_protocol"
  identity_field: "person_id"
  use_cache: true
  cache_dir: "./data/cache_round_protocol_1248"
  cache_lru_size: 64
  preprocess_mode: "ak250_sin_xy"
  sampling_rate: 250
  sampling_rate_in: 1000
  sampling_rate_out: 250
  window_size: 1248
  window_stride: 1248
  subwindow_size: 16
  features: ["x", "y"]
  tasks: ["FXS", "HSS", "RAN", "TEX"]
  num_workers: 8
  val_num_workers: 4
  pin_memory: true
  round_protocol:
    expected_subjects:
      train: 186
      val: 31
      test: 105
    enrollment_task: "RAN"
    enrollment_session: 1
    probe_session: 2

biometric_model:
  type: "temporal_cnn"
  embedding_dim: 128
  channels: 128
  num_blocks: 6
  dilations: [1, 2, 4, 8, 16, 32]
  dropout: 0.2

biometric_training:
  epochs: 50
  lr: 0.001
  weight_decay: 0.00005
  patience: 8
  pk_p: 32
  pk_k: 4
  steps_per_epoch: 350
  ms_alpha: 2.0
  ms_beta: 50.0
  ms_base: 0.5
  ce_weight: 0.4
  eval_batch_size: 128
  monitor: "val_score"

task_training:
  epochs: 30
  batch_size: 256
  lr: 0.001
  weight_decay: 0.0001
  patience: 6
  monitor: "val_accuracy"

baselines:
  gaussian_sigmas: [0.05, 0.1, 0.2, 0.5, 1.0]
  dp_epsilons: [1, 5, 10, 20]
  dp_sensitivity: 2.0
  fixed_ae_sigmas: [0.05, 0.1, 0.5, 1.0]

paths:
  biometric_evaluator: "./experiments/biometric_tune_a/checkpoint_best.pt"
  task_evaluator: "./experiments/task_evaluator_round_protocol/checkpoint_best.pt"
  results_dir: "./experiments/round_protocol_results"

logging:
  output_dir: "./experiments/round_protocol_results/robustness_checks"
  save_interval: 5
