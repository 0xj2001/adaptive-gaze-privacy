# ANIAE ablation stage 1: adaptive architecture without biometric privacy loss.
project:
  name: "eye_tracking_privacy_round_protocol_ablation_no_privacy_stage1"
  seed: 42

data:
  dataset: "gazebase"
  data_dir: "./data/gazebase"
  split_strategy: "round_protocol"
  identity_field: "person_id"
  use_cache: true
  cache_dir: "./data/cache_round_protocol_1248"
  cache_lru_size: 64
  preprocess_mode: "ak250_sin_xy"
  sampling_rate: 250
  sampling_rate_in: 1000
  sampling_rate_out: 250
  window_size: 1248
  window_stride: 1248
  subwindow_size: 16
  features: ["x", "y"]
  tasks: ["FXS", "HSS", "RAN", "TEX"]
  num_workers: 8
  val_num_workers: 4
  pin_memory: true
  round_protocol:
    expected_subjects:
      train: 186
      val: 31
      test: 105
    enrollment_task: "RAN"
    enrollment_session: 1
    probe_session: 2

biometric_model:
  embedding_dim: 128
  base_channels: 64
  growth_rate: 16
  block_layers: [4, 4, 4]
  dropout: 0.2

task_model:
  hidden_dim: 128
  dropout: 0.2

biometric_training:
  epochs: 50
  lr: 0.001
  weight_decay: 0.0001
  patience: 8
  pk_p: 32
  pk_k: 4
  steps_per_epoch: 300
  ms_alpha: 2.0
  ms_beta: 50.0
  ms_base: 0.5
  ce_weight: 0.2
  eval_batch_size: 128
  monitor: "val_rank1_ir"

task_training:
  epochs: 30
  batch_size: 256
  lr: 0.001
  weight_decay: 0.0001
  patience: 6
  monitor: "val_accuracy"

model:
  encoder:
    input_dim: 2
    hidden_dims: [64, 64]
    latent_dim: 24
    dropout: 0.1
  decoder:
    hidden_dims: [32, 64]
    output_dim: 2
  noise:
    mode: "adaptive"
    fixed_sigma: 0.1
    sigma_min: 0.01
    sigma_max: 0.5
    sensitivity_hidden: [32, 32]

aniae_training:
  epochs: 80
  batch_size: 128
  lr_autoencoder: 0.0003
  weight_decay: 0.00001
  patience: 15
  lambda_reconstruction: 1.0
  lambda_privacy: 0.0
  lambda_utility: 0.5
  lambda_noise: 0.8
  target_sigma: 0.10
  sigma_upper: 0.25
  privacy_temperature: 0.07
  monitor: "val_reconstruction_utility_score"

baselines:
  gaussian_sigmas: [0.05, 0.1, 0.2, 0.5, 1.0]
  dp_epsilons: [1, 5, 10, 20]
  dp_sensitivity: 2.0
  fixed_ae_sigmas: [0.05, 0.1, 0.5, 1.0]

paths:
  biometric_evaluator: "./experiments/biometric_tune_a/checkpoint_best.pt"
  task_evaluator: "./experiments/task_evaluator_round_protocol/checkpoint_best.pt"
  results_dir: "./experiments/round_protocol_results/robustness_checks"

logging:
  output_dir: "./experiments"
  save_interval: 5
